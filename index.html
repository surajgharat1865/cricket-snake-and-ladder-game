<!DOCTYPE html>
<html>
<head>
    <title>Cricket Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>🏏 Cricket Snake & Ladder</h1>

<div id="board"></div>

<div class="controls">
    <button onclick="rollDice()">Roll Dice 🎲</button>

    <h2 id="turn">Player 1 Turn</h2>

    <div id="diceBoard">
    <h3>🎲 Dice Results</h3>

    <p style="color:red;">Player 1: <span id="d1">-</span></p>
    <p style="color:blue;">Player 2: <span id="d2">-</span></p>
    <p style="color:lime;">Player 3: <span id="d3">-</span></p>
    <p style="color:orange;">Player 4: <span id="d4">-</span></p>
</div>
</div>

<div class="players">
    <p>🔴 P1: <span id="p1">1</span></p>
    <p>🔵 P2: <span id="p2">1</span></p>
    <p>🟢 P3: <span id="p3">1</span></p>
    <p>🟡 P4: <span id="p4">1</span></p>
</div>

<audio id="diceSound" src="dice.mp3"></audio>
<audio id="outSound" src="out.mp3"></audio>
<audio id="winSound" src="win.mp3"></audio>

<script src="script.js"></script>
</body>
</html>
